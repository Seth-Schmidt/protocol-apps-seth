# Deploy a ConfidentialWrapper from committed deploy-params/<tier>/<network>/wrappers.json.
#
# Security model:
#   - Runs in a GitHub Environment (<tier>-<network>-deploy) with required reviewers, so nothing
#     costs money until an approver signs off and secrets resolve only inside the approved job.
#   - Environment branch policy = main only, so the approved run executes reviewed code.
#   - Signing is DFNS MPC custody when the full DFNS set is present, else PRIVATE_KEY. Those
#     secrets are step-level env on exactly two steps (resolve address + deploy) — never
#     job-level, never GITHUB_ENV.
#   - DEPLOYMENT_RPC_URL is a single per-environment secret, step-level env only.
#   - The PR-opening job (contents: write) is separate and never sees PRIVATE_KEY.
name: contracts-confidential-wrapper-deploy
run-name: 'Deploy wrapper ${{ inputs.target }} ${{ inputs.underlying }}'

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target — tier-network (selects the GitHub environment + deploy-params/<tier>/<network>/ dir). Add a new chain here when adding its dir.'
        type: choice
        options:
          - testnet-sepolia
          - mainnet-ethereum
        default: testnet-sepolia
        required: true
      underlying:
        description: 'Underlying ERC-20 address (0x…), which must have an entry in deploy-params/<tier>/<network>/wrappers.json'
        type: string
        required: true

permissions: {}

concurrency:
  # Serialize per target (tier-network); never cancel a run that may be broadcasting a deploy.
  group: deploy-wrapper-${{ inputs.target }}
  cancel-in-progress: false

env:
  # Mirror safe-chain's independent minimum-package-age check (age + exclusion).
  SAFE_CHAIN_MINIMUM_PACKAGE_AGE_HOURS: '72'
  SAFE_CHAIN_MINIMUM_PACKAGE_AGE_EXCLUSIONS: '@zama-fhe/relayer-sdk'

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.target }}-deploy
    permissions:
      contents: 'read' # Required to checkout repository code
    timeout-minutes: 30
    defaults:
      run:
        working-directory: contracts/confidential-wrapper
    env:
      TARGET: ${{ inputs.target }}
      UNDERLYING: ${{ inputs.underlying }}
    outputs:
      deployed: ${{ steps.deploy.outputs.deployed }}
      symbol: ${{ steps.params.outputs.symbol }}
    steps:
      # Checkout first: the job default working-directory (contracts/confidential-wrapper) does not
      # exist until checkout, so any earlier `run:` step fails to start. Branch policy pins to main.
      - name: Checkout project
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: 'false'

      - name: Parse deploy target
        # Split the tier-network choice into TIER/NETWORK for the steps below. tier is always
        # testnet|mainnet (no dash), so split on the first dash; network keeps any remaining dashes.
        run: |
          echo "TIER=${TARGET%%-*}" >> "$GITHUB_ENV"
          echo "NETWORK=${TARGET#*-}" >> "$GITHUB_ENV"

      # --- Guards (fail fast before the expensive setup below) ------------
      - name: Guard — validate underlying input
        # UNDERLYING is read via env (never interpolated into the script) and validated as a
        # 20-byte hex address before use.
        run: |
          if ! printf '%s' "$UNDERLYING" | grep -Eq '^0x[0-9a-fA-F]{40}$'; then
            echo "::error::underlying '$UNDERLYING' is not a 0x-prefixed 20-byte address. Enter the underlying ERC-20 address, e.g. 0x9b5Cd13b8eFbB58Dc25A05CF411D8056058aDFfF"
            exit 1
          fi

      - name: Guard — signer configured
        # Presence-check the required secrets: only booleans (`secret != ''`) reach the runner, so
        # no value is exposed. Signing needs EITHER the full DFNS set OR PRIVATE_KEY.
        env:
          HAS_PRIVATE_KEY: ${{ secrets.PRIVATE_KEY != '' }}
          HAS_DFNS_AUTH_TOKEN: ${{ secrets.DFNS_AUTH_TOKEN != '' }}
          HAS_DFNS_CRED_ID: ${{ secrets.DFNS_CRED_ID != '' }}
          HAS_DFNS_PRIVATE_KEY: ${{ secrets.DFNS_PRIVATE_KEY != '' }}
          HAS_DFNS_WALLET_ID: ${{ secrets.DFNS_DEPLOYER_WALLET_ID != '' }}
          HAS_RPC: ${{ secrets.DEPLOYMENT_RPC_URL != '' }}
        run: |
          dfns_complete=false
          if [ "$HAS_DFNS_AUTH_TOKEN" = "true" ] && [ "$HAS_DFNS_CRED_ID" = "true" ] && [ "$HAS_DFNS_PRIVATE_KEY" = "true" ] && [ "$HAS_DFNS_WALLET_ID" = "true" ]; then
            dfns_complete=true
          fi
          if [ "$dfns_complete" != "true" ] && [ "$HAS_PRIVATE_KEY" != "true" ]; then
            echo "::error::refusing to deploy without a signer: set the DFNS secrets (DFNS_AUTH_TOKEN, DFNS_CRED_ID, DFNS_PRIVATE_KEY, DFNS_DEPLOYER_WALLET_ID) or PRIVATE_KEY in the ${TIER}-${NETWORK}-deploy environment"
            exit 1
          fi
          if [ "$HAS_RPC" != "true" ]; then
            echo "::error::missing DEPLOYMENT_RPC_URL in the ${TIER}-${NETWORK}-deploy environment"
            exit 1
          fi

      # --- Setup (copied from contracts-confidential-wrapper-tests.yml) -----
      # TODO: remove once runner images ship the CVE-2026-31431 kernel fix
      - name: Workaround CVE-2026-31431 (copy.fail)
        run: |
          echo "install algif_aead /bin/false" | sudo tee /etc/modprobe.d/disable-algif-aead.conf
          if lsmod | grep -q algif_aead; then
            sudo rmmod algif_aead || echo "WARNING: rmmod failed - module may be in use"
          elif modinfo algif_aead 2>/dev/null | grep -q builtin; then
            echo "WARNING: algif_aead built-in - modprobe.d blacklist has no effect"
          fi

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: contracts/confidential-wrapper/package-lock.json

      - name: Install safe-chain (Aikido malicious-package guard)
        shell: bash
        run: curl -fsSL https://github.com/AikidoSec/safe-chain/releases/download/1.5.8/install-safe-chain.sh | sh -s -- --ci

      - name: Install dependencies
        id: deps
        run: npm ci

      # --- Deploy pipeline -------------------------------------------------
      - name: Check params entry exists
        id: params
        # Fail fast (before the expensive compile) if wrappers.json has no matching underlying.
        # Emits `symbol` for the state PR. Deploy re-validates.
        run: npx hardhat task:checkParamsEntry --underlying "$UNDERLYING" --network "$NETWORK"

      - name: Compile
        run: npx hardhat compile

      # Resolve the deployer address (DFNS wallet or PRIVATE_KEY-derived). No RPC call; writes
      # `address=<addr>` to $GITHUB_OUTPUT for downstream steps.
      - name: Resolve deployer address
        id: signer
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          DFNS_AUTH_TOKEN: ${{ secrets.DFNS_AUTH_TOKEN }}
          DFNS_CRED_ID: ${{ secrets.DFNS_CRED_ID }}
          DFNS_PRIVATE_KEY: ${{ secrets.DFNS_PRIVATE_KEY }}
          DFNS_DEPLOYER_WALLET_ID: ${{ secrets.DFNS_DEPLOYER_WALLET_ID }}
        run: npx hardhat task:printDeployerAddress --network "$NETWORK"

      - name: Preflight
        env:
          DEPLOYMENT_RPC_URL: ${{ secrets.DEPLOYMENT_RPC_URL }}
          DEPLOYER_ADDRESS: ${{ steps.signer.outputs.address }}
        run: |
          npx hardhat task:preflightConfidentialWrapper \
            --underlying "$UNDERLYING" \
            --deployer-address "$DEPLOYER_ADDRESS" \
            --network "$NETWORK"

      # Broadcast the deploy (DFNS custody or PRIVATE_KEY). RPC needed for gas estimation + receipts.
      - name: Deploy
        id: deploy
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          DFNS_AUTH_TOKEN: ${{ secrets.DFNS_AUTH_TOKEN }}
          DFNS_CRED_ID: ${{ secrets.DFNS_CRED_ID }}
          DFNS_PRIVATE_KEY: ${{ secrets.DFNS_PRIVATE_KEY }}
          DFNS_DEPLOYER_WALLET_ID: ${{ secrets.DFNS_DEPLOYER_WALLET_ID }}
          DEPLOYMENT_RPC_URL: ${{ secrets.DEPLOYMENT_RPC_URL }}
        run: |
          npx hardhat task:deployConfidentialWrapperFromParams \
            --underlying "$UNDERLYING" \
            --network "$NETWORK"
          echo "deployed=true" >> "$GITHUB_OUTPUT"

      - name: Verify on explorers
        id: verify
        continue-on-error: true
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          DEPLOYMENT_RPC_URL: ${{ secrets.DEPLOYMENT_RPC_URL }}
          # Step outputs via env (not ${{ }} in the script) to satisfy zizmor template-expansion checks.
          PROXY: ${{ steps.deploy.outputs.proxy }}
        run: |
          # The deploy step emits the proxy address, so we never reconstruct the artifact name.
          if [ -z "$PROXY" ]; then
            echo "::warning::no proxy address from the deploy step; skipping verification"
            exit 0
          fi
          echo "Proxy address: $PROXY"
          if [ -z "${ETHERSCAN_API_KEY:-}" ]; then
            echo "::warning::ETHERSCAN_API_KEY is empty in the ${TIER}-${NETWORK}-deploy environment."
          fi
          # Brief wait so explorers can index the deploy tx / Upgraded logs.
          echo "Waiting 10s for explorer indexing…"
          sleep 10
          npx hardhat task:verifyConfidentialWrapper --proxy-address "$PROXY" --network "$NETWORK"

      - name: Post-deploy checks
        id: postcheck
        continue-on-error: true
        env:
          DEPLOYMENT_RPC_URL: ${{ secrets.DEPLOYMENT_RPC_URL }}
        run: |
          npx hardhat task:reportConfidentialWrapper \
            --underlying "$UNDERLYING" \
            --out deploy-log.json \
            --strict \
            --network "$NETWORK"

      - name: Summary
        # Only after setup completed — pre-checkout guard failures have no state.
        if: ${{ always() && steps.deps.outcome == 'success' }}
        env:
          DEPLOYMENT_RPC_URL: ${{ secrets.DEPLOYMENT_RPC_URL }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
          POSTCHECK_OUTCOME: ${{ steps.postcheck.outcome }}
          PROXY: ${{ steps.deploy.outputs.proxy }}
        run: |
          # Ensure a deploy-log + summary exists even when an earlier step failed.
          if [ ! -f deploy-log.json ]; then
            npx hardhat task:reportConfidentialWrapper \
              --underlying "$UNDERLYING" \
              --out deploy-log.json \
              --network "$NETWORK" || echo "reporter could not run (nothing deployed yet)"
          fi
          {
            echo ""
            echo "### Step outcomes"
            echo "- deploy: $DEPLOY_OUTCOME"
            echo "- verify: $VERIFY_OUTCOME"
            echo "- postcheck: $POSTCHECK_OUTCOME"
            echo ""
            echo "### Next steps"
            echo "1. Review the DAO registration calldata above and submit the governance proposal to register the wrapper."
            echo "2. Merge the auto-opened state PR so committed deployment state stays current (the next run reads committed state)."
            echo "3. Update docs/addresses/ with the new wrapper entry."
            if [ "$VERIFY_OUTCOME" = "failure" ] && [ -n "$PROXY" ]; then
              echo ""
              echo "### Re-run verification"
              echo "Etherscan verification did not complete — deploy is fine. From \`contracts/confidential-wrapper\`:"
              echo ""
              echo '```bash'
              echo "npx hardhat task:verifyConfidentialWrapper --proxy-address $PROXY --network ${NETWORK}"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload deploy artifacts
        if: ${{ always() && steps.deps.outcome == 'success' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wrapper-deploy-${{ inputs.target }}-${{ inputs.underlying }}-${{ github.run_id }}
          retention-days: 90
          include-hidden-files: true
          if-no-files-found: warn
          path: |
            contracts/confidential-wrapper/deployments/${{ env.NETWORK }}/
            contracts/confidential-wrapper/.openzeppelin/*.json
            contracts/confidential-wrapper/deploy-log.json

      - name: Enforce post-deploy check result
        # Runs after artifacts are uploaded and the state PR job is scheduled, so
        # a postcheck failure turns the job red without losing recovery state.
        if: ${{ always() && steps.deps.outcome == 'success' }}
        env:
          POSTCHECK_OUTCOME: ${{ steps.postcheck.outcome }}
        run: |
          if [ "$POSTCHECK_OUTCOME" = "failure" ]; then
            echo "::error::post-deploy checks failed — see the summary. Deployment state is preserved (artifact + state PR)."
            exit 1
          fi

  open-state-pr:
    name: open-state-pr
    needs: deploy
    # Runs even when verify/postcheck failed: persisting the OZ manifest + proxy artifact is what
    # makes recovery possible.
    if: ${{ !cancelled() && needs.deploy.outputs.deployed == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: 'write' # Required to push the state branch
      pull-requests: 'write' # Required to open the PR
    steps:
      - name: Checkout project
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: 'false'

      - name: Download deploy artifacts onto the tree
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wrapper-deploy-${{ inputs.target }}-${{ inputs.underlying }}-${{ github.run_id }}
          path: contracts/confidential-wrapper

      - name: Open state PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          add-paths: |
            contracts/confidential-wrapper/deployments/**
            contracts/confidential-wrapper/.openzeppelin/*.json
          branch: deploy/wrapper-${{ inputs.target }}-${{ inputs.underlying }}-${{ github.run_id }}
          base: main
          commit-message: 'chore: persist ${{ needs.deploy.outputs.symbol }} deploy state (${{ inputs.target }})'
          title: 'chore: persist ${{ needs.deploy.outputs.symbol }} deploy state (${{ inputs.target }})'
          body: |
            Automated deployment-state commit from run
            [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

            Persists the OpenZeppelin manifest and `hardhat-deploy` artifacts for the
            `${{ needs.deploy.outputs.symbol }}` wrapper (underlying `${{ inputs.underlying }}`)
            on `${{ inputs.target }}` so the next deploy run starts from committed state and
            can reuse the implementation.

            ⚠️ The wrapper is not active until the Protocol DAO registers it — see the
            registration calldata in the run summary.

            > Note: PRs created by `GITHUB_TOKEN` do not trigger CI. That is fine (state
            > JSON needs no CI) but merge promptly so the next run sees committed state.
