# Deploy a ConfidentialWrapper from committed deploy-params.
#
# Security model:
#   - Runs in a GitHub Environment (<network>-deploy) with required reviewers, so
#     nothing costs money until an approver signs off; secrets resolve only inside
#     the approved job.
#   - Environment deployment-branch policy = main only, so the approved run can
#     only execute reviewed workflow code.
#   - Signing is DFNS MPC custody when the DFNS auth secrets are set AND the network
#     has a committed dfnsDeployerWalletId (deploy-params/networks.json); otherwise it
#     falls back to PRIVATE_KEY. The signing secrets (DFNS_AUTH_TOKEN / DFNS_CRED_ID /
#     DFNS_PRIVATE_KEY and PRIVATE_KEY) are exposed as step-level env on exactly two
#     steps (resolve deployer address + deploy) — never job-level, never GITHUB_ENV.
#     The DFNS wallet id is NOT a secret (it maps to a public address) and lives in
#     committed config, not in the environment.
#   - Deployment RPC secrets are mapped to SEPOLIA_RPC_URL / MAINNET_RPC_URL per step only.
#   - The PR-opening job (contents: write) is separate and never sees PRIVATE_KEY.
name: contracts-confidential-wrapper-deploy

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Target network'
        type: choice
        options:
          - testnet
          - mainnet
        default: testnet
        required: true
      wrapper:
        description: 'Token symbol, which must match a params file under deploy-params/<network>/. Enter cTEST for the file deploy-params/<network>/cTEST.json'
        type: string
        required: true
      force_redeploy:
        description: 'Deploy a new proxy even if one already exists for this wrapper name'
        type: boolean
        default: false
        required: false

permissions: {}

concurrency:
  # Serialize per network; never cancel a run that may be broadcasting a deploy.
  group: deploy-wrapper-${{ inputs.network }}
  cancel-in-progress: false

env:
  # Safe-chain enforces its own minimum-package-age check independently,
  # mirror both the age (72 h) and the exclusion here.
  SAFE_CHAIN_MINIMUM_PACKAGE_AGE_HOURS: '72'
  SAFE_CHAIN_MINIMUM_PACKAGE_AGE_EXCLUSIONS: '@zama-fhe/relayer-sdk'

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.network }}-deploy
    permissions:
      contents: 'read' # Required to checkout repository code
    timeout-minutes: 30
    defaults:
      run:
        working-directory: contracts/confidential-wrapper
    env:
      NETWORK: ${{ inputs.network }}
      WRAPPER: ${{ inputs.wrapper }}
    outputs:
      deployed: ${{ steps.deploy.outputs.deployed }}
    steps:
      # Checkout first so every subsequent run step has a valid working directory.
      # The job default is contracts/confidential-wrapper, which does not exist on
      # the runner until checkout populates it; running any `run:` step before this
      # fails to start (no such working directory). The environment branch policy
      # pins this checkout to reviewed main.
      - name: Checkout project
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: 'false'

      # --- Guards (fail fast before the expensive setup below) ------------
      - name: Guard — validate wrapper input
        # WRAPPER is read via env (never interpolated into the script body) and
        # path-validated before it is used to build a params-file path.
        run: |
          if ! printf '%s' "$WRAPPER" | grep -Eq '^[A-Za-z0-9._-]+$'; then
            echo "::error::wrapper '$WRAPPER' contains invalid characters (allowed: A-Za-z0-9._-). Enter the token symbol only, e.g. cTEST"
            exit 1
          fi

      - name: Guard — signer configured
        # Presence-check the required secrets. Only booleans (`secret != ''`) reach
        # the runner, so no secret value is exposed as env. Signing is satisfied by
        # EITHER the DFNS auth trio OR PRIVATE_KEY; the DFNS wallet id is non-secret
        # config in networks.json, validated later by the deploy task.
        env:
          HAS_PRIVATE_KEY: ${{ secrets.PRIVATE_KEY != '' }}
          HAS_DFNS_AUTH_TOKEN: ${{ secrets.DFNS_AUTH_TOKEN != '' }}
          HAS_DFNS_CRED_ID: ${{ secrets.DFNS_CRED_ID != '' }}
          HAS_DFNS_PRIVATE_KEY: ${{ secrets.DFNS_PRIVATE_KEY != '' }}
          HAS_TESTNET_RPC: ${{ secrets.SEPOLIA_DEPLOYMENT_RPC_URL != '' }}
          HAS_MAINNET_RPC: ${{ secrets.MAINNET_DEPLOYMENT_RPC_URL != '' }}
        run: |
          if [ "$NETWORK" = "mainnet" ]; then
            rpc_present="$HAS_MAINNET_RPC"; rpc_secret="MAINNET_DEPLOYMENT_RPC_URL"
          else
            rpc_present="$HAS_TESTNET_RPC"; rpc_secret="SEPOLIA_DEPLOYMENT_RPC_URL"
          fi
          dfns_complete=false
          if [ "$HAS_DFNS_AUTH_TOKEN" = "true" ] && [ "$HAS_DFNS_CRED_ID" = "true" ] && [ "$HAS_DFNS_PRIVATE_KEY" = "true" ]; then
            dfns_complete=true
          fi
          if [ "$dfns_complete" != "true" ] && [ "$HAS_PRIVATE_KEY" != "true" ]; then
            echo "::error::refusing to deploy without a signer: set the DFNS auth secrets (DFNS_AUTH_TOKEN, DFNS_CRED_ID, DFNS_PRIVATE_KEY) or PRIVATE_KEY in the ${NETWORK}-deploy environment"
            exit 1
          fi
          if [ "$rpc_present" != "true" ]; then
            echo "::error::missing ${rpc_secret} in the ${NETWORK}-deploy environment"
            exit 1
          fi

      # --- Setup (copied from contracts-confidential-wrapper-tests.yml) -----
      # TODO: remove once GitHub runner images ship the CVE-2026-31431 kernel fix
      - name: Workaround CVE-2026-31431 (copy.fail)
        run: |
          echo "install algif_aead /bin/false" | sudo tee /etc/modprobe.d/disable-algif-aead.conf
          if lsmod | grep -q algif_aead; then
            sudo rmmod algif_aead || echo "WARNING: rmmod failed - module may be in use"
          elif modinfo algif_aead 2>/dev/null | grep -q builtin; then
            echo "WARNING: algif_aead built-in - modprobe.d blacklist has no effect"
          fi

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: contracts/confidential-wrapper/package-lock.json

      - name: Install safe-chain (Aikido malicious-package guard)
        shell: bash
        run: curl -fsSL https://github.com/AikidoSec/safe-chain/releases/download/1.5.8/install-safe-chain.sh | sh -s -- --ci

      - name: Install dependencies
        id: deps
        run: npm ci

      # --- Deploy pipeline -------------------------------------------------
      - name: Check params file exists
        run: |
          PARAMS_FILE="deploy-params/${NETWORK}/${WRAPPER}.json"
          if [ ! -f "$PARAMS_FILE" ]; then
            echo "::error::params file $PARAMS_FILE not found — add it under deploy-params/ and merge before deploying"
            exit 1
          fi
          echo "Using $PARAMS_FILE"

      - name: Compile
        run: npx hardhat compile

      # DFNS swap point 1: resolve the deployer address. task:printDeployerAddress
      # returns the DFNS wallet address when DFNS is configured, else the address
      # derived from PRIVATE_KEY. It makes no RPC call and writes `address=<addr>`
      # to $GITHUB_OUTPUT for downstream steps.
      - name: Resolve deployer address
        id: signer
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          DFNS_AUTH_TOKEN: ${{ secrets.DFNS_AUTH_TOKEN }}
          DFNS_CRED_ID: ${{ secrets.DFNS_CRED_ID }}
          DFNS_PRIVATE_KEY: ${{ secrets.DFNS_PRIVATE_KEY }}
        run: npx hardhat task:printDeployerAddress --network "$NETWORK"

      - name: Preflight
        env:
          SEPOLIA_RPC_URL: ${{ inputs.network == 'testnet' && secrets.SEPOLIA_DEPLOYMENT_RPC_URL || '' }}
          MAINNET_RPC_URL: ${{ inputs.network == 'mainnet' && secrets.MAINNET_DEPLOYMENT_RPC_URL || '' }}
          FORCE_REDEPLOY: ${{ inputs.force_redeploy }}
          DEPLOYER_ADDRESS: ${{ steps.signer.outputs.address }}
        run: |
          npx hardhat task:preflightConfidentialWrapper \
            --params-file "deploy-params/${NETWORK}/${WRAPPER}.json" \
            --deployer-address "$DEPLOYER_ADDRESS" \
            --network "$NETWORK"

      # DFNS swap point 2: broadcast the deploy. Uses DFNS custody when configured,
      # else the PRIVATE_KEY signer. RPC is needed for gas estimation + receipts.
      - name: Deploy
        id: deploy
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          DFNS_AUTH_TOKEN: ${{ secrets.DFNS_AUTH_TOKEN }}
          DFNS_CRED_ID: ${{ secrets.DFNS_CRED_ID }}
          DFNS_PRIVATE_KEY: ${{ secrets.DFNS_PRIVATE_KEY }}
          SEPOLIA_RPC_URL: ${{ inputs.network == 'testnet' && secrets.SEPOLIA_DEPLOYMENT_RPC_URL || '' }}
          MAINNET_RPC_URL: ${{ inputs.network == 'mainnet' && secrets.MAINNET_DEPLOYMENT_RPC_URL || '' }}
        run: |
          npx hardhat task:deployConfidentialWrapperFromParams \
            --params-file "deploy-params/${NETWORK}/${WRAPPER}.json" \
            --network "$NETWORK"
          echo "deployed=true" >> "$GITHUB_OUTPUT"

      - name: Verify on Etherscan
        id: verify
        continue-on-error: true
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          SEPOLIA_RPC_URL: ${{ inputs.network == 'testnet' && secrets.SEPOLIA_DEPLOYMENT_RPC_URL || '' }}
          MAINNET_RPC_URL: ${{ inputs.network == 'mainnet' && secrets.MAINNET_DEPLOYMENT_RPC_URL || '' }}
        run: |
          PARAMS_FILE="deploy-params/${NETWORK}/${WRAPPER}.json"
          # Proxy artifact name contains spaces/parens — read it in Node.
          PROXY=$(node -e "const p=require('./'+process.argv[1]);const d=require('./deployments/'+process.argv[2]+'/ConfidentialWrapper_'+p.name+'_Proxy.json');process.stdout.write(d.address)" "$PARAMS_FILE" "$NETWORK")
          echo "Proxy address: $PROXY"
          # An empty key drops hardhat-verify to Etherscan's unauthenticated ~3/sec
          # tier, which retries cannot beat.
          if [ -z "${ETHERSCAN_API_KEY:-}" ]; then
            echo "::warning::ETHERSCAN_API_KEY is empty in the ${NETWORK}-deploy environment; verification will likely be rate-limited. Deploy is unaffected."
          fi
          # Minimal retry around Etherscan indexing lag: 10s increments capped at 30s.
          for attempt in 1 2 3 4 5; do
            set +e
            out=$(npx hardhat task:verifyConfidentialWrapper --proxy-address "$PROXY" --network "$NETWORK" 2>&1)
            rc=$?
            set -e
            echo "$out"
            if [ "$rc" -eq 0 ]; then
              echo "Verification succeeded on attempt $attempt"
              exit 0
            fi
            if echo "$out" | grep -qiE "proxy ${PROXY}.*already.*verified|already.*verified.*proxy ${PROXY}"; then
              echo "Proxy already verified; treating as success."
              exit 0
            fi
            if [ "$attempt" -lt 5 ]; then
              delay=$((attempt * 10)); [ "$delay" -gt 30 ] && delay=30
              echo "Verify attempt $attempt failed; retrying in ${delay}s..."
              sleep "$delay"
            fi
          done
          echo "::warning::Etherscan verification did not complete — deploy is fine; re-run: npx hardhat task:verifyConfidentialWrapper --proxy-address ${PROXY} --network ${NETWORK}"
          exit 1

      - name: Post-deploy checks
        id: postcheck
        continue-on-error: true
        env:
          SEPOLIA_RPC_URL: ${{ inputs.network == 'testnet' && secrets.SEPOLIA_DEPLOYMENT_RPC_URL || '' }}
          MAINNET_RPC_URL: ${{ inputs.network == 'mainnet' && secrets.MAINNET_DEPLOYMENT_RPC_URL || '' }}
        run: |
          npx hardhat task:reportConfidentialWrapper \
            --params-file "deploy-params/${NETWORK}/${WRAPPER}.json" \
            --out deploy-log.json \
            --strict \
            --network "$NETWORK"

      - name: Summary
        # Only after setup completed — pre-checkout guard failures have no state.
        if: ${{ always() && steps.deps.outcome == 'success' }}
        env:
          SEPOLIA_RPC_URL: ${{ inputs.network == 'testnet' && secrets.SEPOLIA_DEPLOYMENT_RPC_URL || '' }}
          MAINNET_RPC_URL: ${{ inputs.network == 'mainnet' && secrets.MAINNET_DEPLOYMENT_RPC_URL || '' }}
        run: |
          # Ensure a deploy-log + summary exists even when an earlier step failed.
          if [ ! -f deploy-log.json ]; then
            npx hardhat task:reportConfidentialWrapper \
              --params-file "deploy-params/${NETWORK}/${WRAPPER}.json" \
              --out deploy-log.json \
              --network "$NETWORK" || echo "reporter could not run (nothing deployed yet)"
          fi
          {
            echo ""
            echo "### Step outcomes"
            echo "- deploy: ${{ steps.deploy.outcome }}"
            echo "- verify: ${{ steps.verify.outcome }}"
            echo "- postcheck: ${{ steps.postcheck.outcome }}"
            echo ""
            echo "### Next steps"
            echo "1. Review the DAO registration calldata above and submit the governance proposal to register the wrapper."
            echo "2. Merge the auto-opened state PR so committed deployment state stays current (the next run reads committed state)."
            echo "3. Update docs/addresses/ with the new wrapper entry."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload deploy artifacts
        if: ${{ always() && steps.deps.outcome == 'success' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wrapper-deploy-${{ inputs.network }}-${{ inputs.wrapper }}-${{ github.run_id }}
          retention-days: 90
          include-hidden-files: true
          if-no-files-found: warn
          path: |
            contracts/confidential-wrapper/deployments/${{ inputs.network }}/
            contracts/confidential-wrapper/.openzeppelin/*.json
            contracts/confidential-wrapper/deploy-log.json

      - name: Enforce post-deploy check result
        # Runs after artifacts are uploaded and the state PR job is scheduled, so
        # a postcheck failure turns the job red without losing recovery state.
        if: ${{ always() && steps.deps.outcome == 'success' }}
        run: |
          if [ "${{ steps.postcheck.outcome }}" == "failure" ]; then
            echo "::error::post-deploy checks failed — see the summary. Deployment state is preserved (artifact + state PR)."
            exit 1
          fi

  open-state-pr:
    name: open-state-pr
    needs: deploy
    # Runs even when verify/postcheck failed (deploy job may be red): persisting
    # the OZ manifest + proxy artifact is what makes recovery possible.
    if: ${{ !cancelled() && needs.deploy.outputs.deployed == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: 'write' # Required to push the state branch
      pull-requests: 'write' # Required to open the PR
    steps:
      - name: Checkout project
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: 'false'

      - name: Download deploy artifacts onto the tree
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wrapper-deploy-${{ inputs.network }}-${{ inputs.wrapper }}-${{ github.run_id }}
          path: contracts/confidential-wrapper

      - name: Open state PR
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6.1.0
        with:
          add-paths: |
            contracts/confidential-wrapper/deployments/**
            contracts/confidential-wrapper/.openzeppelin/*.json
          branch: deploy/wrapper-${{ inputs.network }}-${{ inputs.wrapper }}-${{ github.run_id }}
          base: main
          commit-message: 'chore: persist ${{ inputs.wrapper }} deploy state (${{ inputs.network }})'
          title: 'chore: persist ${{ inputs.wrapper }} deploy state (${{ inputs.network }})'
          body: |
            Automated deployment-state commit from run
            [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

            Persists the OpenZeppelin manifest and `hardhat-deploy` artifacts for the
            `${{ inputs.wrapper }}` wrapper on `${{ inputs.network }}` so the next
            deploy run starts from committed state and can reuse the implementation.

            ⚠️ The wrapper is not active until the Protocol DAO registers it — see the
            registration calldata in the run summary.

            > Note: PRs created by `GITHUB_TOKEN` do not trigger CI. That is fine (state
            > JSON needs no CI) but merge promptly so the next run sees committed state.
